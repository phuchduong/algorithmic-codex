<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Price History</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* --- CORE GLOBAL STYLES --- 
           Controls the general page layout and typography.
        */
        body { 
            /* Clean sans-serif stack for cross-platform consistency */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background-color: #f4f7f9; /* Light grey-blue background */
            color: #2d3436; 
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            /* Subtle shadow to give the card a floating effect */
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }

        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 700; 
            color: #1e272e; 
        }

        /* --- END: CORE GLOBAL STYLES --- */

        /* --- DATA TABLE SECTION --- 
           Spacing for the jQuery DataTable area.
        */
        .table-section { margin-bottom: 40px; }
        /* --- END: DATA TABLE SECTION --- 

        /* --- D3 CHART SECTION --- 
           Styles for the custom SVG elements rendered by D3.js.
        */
        .d3-chart-section { margin-bottom: 40px; width: 100%; }
        .d3-chart-section .line { 
            fill: none; /* Lines should not have a background fill */
            stroke: #3182ce; 
            stroke-width: 2; 
        }
        .d3-chart-section .axis-label { 
            font-size: 12px; 
            fill: #718096; /* Soft grey for dates and price labels */
        }
        .d3-chart-section .grid line { 
            stroke: #edf2f7; 
            stroke-opacity: 0.7; 
            shape-rendering: crispEdges; /* Prevents blurry grid lines */
        }
        /* --- END: D3 CHART SECTION --- 

        /* --- APEX CHART SECTION --- */
        .apex-chart-section { margin-bottom: 40px; width: 100%; }
        /* --- END: APEX CHART SECTION --- */

        /* --- FOOTER STYLES --- 
           Grid-based layout for project links and author information.
        */
        footer { 
            margin-top: 50px; 
            padding-top: 30px; 
            border-top: 1px solid #edf2f7; 
        }
        .footer-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 40px; 
        }
        .footer-section h3 { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #718096; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .footer-list { list-style: none; padding: 0; margin: 0; }
        .footer-list li { margin-bottom: 12px; font-size: 0.95rem; }
        .footer-list label { 
            font-weight: 600; 
            color: #4a5568; 
            min-width: 110px; /* Aligns values vertically across different labels */
            display: inline-block; 
        }
        .footer-list a { color: #3182ce; text-decoration: none; }
        .author-name { font-size: 1.1rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; display: block; }
        /* --- END: FOOTER STYLES --- 

        /* Mobile optimization: stack columns on small screens */
        @media (max-width: 600px) { .footer-grid { grid-template-columns: 1fr; gap: 30px; } }
        /* END: Mobile optimization */
    </style>
</head>
<body>

<div class="container">
    <h2>Bitcoin Price History</h2>


    <!-- BEGIN: BTC DATA TABLE -->
    <section class="table-section">
        <table id="btc-table" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Close Price (USD)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    <!-- END: BTC DATA TABLE -->


    <!-- BEGIN: BTC D3 CHART -->
    <section class="d3-chart-section">
        <h3 class="chart-section-header">BTC Price - D3.js</h3>
        <div id="d3-chart-container"></div>
    </section>
    <!-- END: BTC D3 CHART -->


    <!-- BEGIN: BTC APEX CHART -->
    <section class="apex-chart-section">
        <h3 class="chart-section-header">BTC Price - ApexCharts</h3>
        <div id="apex-chart-container"></div>
    </section>
    <!-- END: BTC APEX CHART -->


    <!-- BEGIN: FOOTER -->
    <footer>
        <div class="footer-grid">
            <div class="footer-section">
                <h3><i class="fa-solid fa-link"></i> Project Links</h3>
                <ul class="footer-list">
                    <li><label>Website:</label> <a href="https://phuchduong.github.io/algorithmic-codex/btc_dt/" target="_blank">BTC Price History</a></li>
                    <li><label>Repo Readme:</label> <a href="https://phuchduong.github.io/algorithmic-codex/" target="_blank">Algorithmic Codex</a></li>
                    <li><label>Source Code:</label> <a href="https://github.com/phuchduong/algorithmic-codex" target="_blank">github.com/phuchduong</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3><i class="fa-solid fa-user"></i> Author</h3>
                <span class="author-name">Phuc Duong</span>
                <ul class="footer-list">
                    <li><label><i class="fa-brands fa-github"></i> GitHub:</label> <a href="https://github.com/phuchduong" target="_blank">@phuchduong</a></li>
                    <li><label><i class="fa-brands fa-linkedin"></i> LinkedIn:</label> <a href="https://www.linkedin.com/in/phuchduong/" target="_blank">in/phuchduong</a></li>
                </ul>
            </div>
        </div>
    </footer>
    <!-- END: FOOTER -->

</div> <!-- div class="container" -->

<!-- JQUERY -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- JQUERY DATA TABLES -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- D3.JS -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- APEX CHART -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<script>
    /**
     * SHARED DATA UTILITIES
     * Common logic for fetching and sanitizing data.
     */
    async function load_data(url) {
        try {
            // Uses d3.csv helper to fetch and parse CSV into an array of objects
            const data = await d3.csv(url);
            console.log("Loaded data successfully from: " + url);
            return data;
        } catch (err) {
            console.error("Failed to load data from: " + url, err);
            throw err;
        }
    }

    function parse_data(data) {
        console.log("Data parsed. Total records: " + data.length);
        
        // Print a 4-line sample of the raw data to the console
        console.log("Raw data sample (first 4 rows):");
        console.table(data.slice(0, 4));

        const parseTime = d3.timeParse("%Y-%m-%d");
        return data.map(d => ({
            ...d,
            // Convert string date to JS Date object for mathematical operations in charts
            dateObj: parseTime(d.Date.split(' ')[0]),
            // The '+' unary operator forces the string price to a float/number
            closeVal: +d.Close,
            // Clean YYYY-MM-DD string for display in the table
            formattedDate: d.Date.split(' ')[0]
        }));
    }
    /* END DATA UTILITIES */

    /**
     * MODULE: DATA AUGMENTATION
     * Adds technical indicators to the dataset.
     */
    function add_200dma(data) {
        // Ensure data is sorted chronologically for accurate rolling calculation
        const sortedData = [...data].sort((a, b) => a.dateObj - b.dateObj);

        return sortedData.map((d, i, arr) => {
            let mavg = null;
            
            // Only calculate if we have at least 200 data points of history
            if (i >= 199) {
                const window = arr.slice(i - 199, i + 1);
                const sum = window.reduce((acc, curr) => acc + curr.closeVal, 0);
                mavg = sum / 200;
            }

            return {
                ...d,
                dma200: mavg // New column added to each object
            };
        });
    }
    /* END: DATA AUGMENTATION */

    /**
     * MODULE: DATATABLES
     * Renders a searchable, sortable HTML table.
     */
    function InitDataTable(data) {
        try {
            const tableEl = document.getElementById('btc-table');
            if (!tableEl) return;

            // Initialize the jQuery plugin
            $(tableEl).DataTable({
                data: data,
                columns: [
                    { data: "formattedDate" },
                    { 
                        data: "closeVal", 
                        // Built-in helper to format numbers as currency ($1,234.56)
                        render: $.fn.dataTable.render.number(',', '.', 2, '$')
                    }
                ],
                order: [[0, 'desc']], // Sort by date descending by default
                pageLength: 10
            });
            console.log("DataTable initialized successfully.");
        } catch (err) { console.error("DataTable Error:", err); }
    }
    /* END: DATATABLES */

    /**
     * MODULE: D3 CHART
     * Manually constructs an SVG line chart. 
     * Note: D3 provides the math/scaling, but we must manually create elements.
     */
    function InitD3Chart(data) {
        try {
            const container = document.getElementById('d3-chart-container');
            if (!container) return;

            // Setup chart dimensions based on parent container width
            const margin = {top: 20, right: 30, bottom: 40, left: 60};
            const width = container.offsetWidth - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            // Select container and inject an SVG with a nested group <g>
            const svg = d3.select("#d3-chart-container")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // X Scale: Maps Date objects to pixel width
            const x = d3.scaleTime()
                .domain(d3.extent(data, d => d.dateObj))
                .range([0, width]);

            // Y Scale: Maps Price values to pixel height (inverted: 0 is top in SVG)
            const y = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.closeVal)])
                .range([height, 0]);

            // Bottom Axis (Dates)
            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).ticks(6))
                .attr("class", "axis-label");

            // Left Axis (Price) with currency formatting
            svg.append("g")
                .call(d3.axisLeft(y).tickFormat(d => "$" + d3.format(",.0f")(d)))
                .attr("class", "axis-label");

            // Path Generator: converts the array of objects into an SVG path string "M x,y L x,y..."
            const line = d3.line()
                .x(d => x(d.dateObj))
                .y(d => y(d.closeVal));

            // Sort data chronologically before drawing to ensure line flows left-to-right
            svg.append("path")
                .datum(data.sort((a, b) => a.dateObj - b.dateObj))
                .attr("class", "line")
                .attr("d", line);

            console.log("D3 Chart rendered.");
        } catch (err) { console.error("D3 Error:", err); }
    }
    /* END: D3 CHART */

    /**
     * MODULE: APEX CHARTS
     * Renders a modern, interactive area chart using high-level configuration.
     */
    function InitApexChart(data) {
        try {
            const container = document.getElementById('apex-chart-container');
            if (!container) return;

            // ApexCharts specific format: [timestamp_in_ms, value]
            const sorted = [...data].sort((a, b) => a.dateObj - b.dateObj);
        
            const btcSeries = sorted.map(d => [d.dateObj.getTime(), d.closeVal]);
            const dmaSeries = sorted.map(d => [d.dateObj.getTime(), d.dma200]); // Keep nulls to maintain array alignment

            const options = {
                series: [
                    /* LINE 1: BTC PRICE */
                    { name: 'BTC Price', data: btcSeries },
                    /* LINE 2: 200 DAY MOVING AVERAGE */
                    { name: '200 DMA', data: dmaSeries }
                ],
                chart: { 
                    type: 'line', 
                    height: 350, 
                    zoom: { enabled: true } // Interactive zooming enabled by default
                },
                tooltip: {
                    shared: true,     // Essential: combines all series into one tooltip
                    intersect: false, // Essential: triggers based on vertical hover area
                    x: {
                        format: 'MMM dd yyyy'
                    }
                },
                dataLabels: { enabled: false },  // labels every data point. would be too noisy to turn this on because the data has more datapoint than can be displayed on the graph neatly
                stroke: {
                  curve: 'smooth'
                , width: [1, 1] // 2px for BTC Price, 1px for 200 DMA
                },
                xaxis: { 
                    type: 'datetime', 
                    labels: { style: { colors: '#718096' } } 
                },
                yaxis: {
                    labels: {
                        formatter: (val) => "$" + val.toLocaleString(),
                        style: { colors: '#718096' }
                    }
                },
                colors: [
                  '#3182ce' // Blue for BTC
                , '#F6AD55' // Yellow/Orange for 200 DMA
                ],
                fill: {
                    type: 'none'
                }
            };

            new ApexCharts(container, options).render();
            console.log("Apex Chart rendered.");
        } catch (err) { console.error("Apex Error:", err); }
    }
    /* END: APEX CHARTS */

    /**
     * EXECUTION: MAIN FUNCTION
     * Main entry point using an IIFE (Immediately Invoked Function Expression) to handle async logic.
     */
    (async () => {
        try {
            console.log("Starting page execution...");

            // Step 1: Fetch raw CSV
            const raw = await load_data("btc_full_history_to_today.csv");
            
            // Step 2: Parse and format
            const parsed_data = parse_data(raw);
            console.log("Parsed data sample (first 4 rows):");
            console.table(parsed_data.slice(0, 4));

            // --- ADDITIVE MODULE START ---
            // This transforms the data before passing it to UI components
            const augmented_data = add_200dma(parsed_data);
            // --- ADDITIVE MODULE END ---

            // Step 3: Initialize all UI components with the same dataset
            InitDataTable(augmented_data);
            InitD3Chart(augmented_data);
            InitApexChart(augmented_data);

            console.log("All UI components initialized.");
        } catch (err) {
            console.error("Main Execution Failed:", err);
        }
    })();
    /* END OF MAIN FUNCTION */
</script>

</body>
</html>
