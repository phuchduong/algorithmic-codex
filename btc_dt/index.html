<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Price History</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* --- CORE GLOBAL STYLES --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background-color: #f4f7f9; 
            color: #2d3436; 
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }

        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 700; 
            color: #1e272e; 
        }

        /* --- DATA TABLE SECTION --- */
        .table-section { margin-bottom: 40px; }

        /* --- D3 CHART SECTION --- */
        .d3-chart-section { margin-bottom: 40px; width: 100%; }
        .d3-chart-section .line { 
            fill: none; 
            stroke: #3182ce; 
            stroke-width: 2; 
        }
        .d3-chart-section .axis-label { 
            font-size: 12px; 
            fill: #718096; 
        }
        .d3-chart-section .grid line { 
            stroke: #edf2f7; 
            stroke-opacity: 0.7; 
            shape-rendering: crispEdges; 
        }

        /* --- APEX CHART SECTION --- */
        .apex-chart-section { margin-bottom: 40px; width: 100%; }

        /* --- FOOTER STYLES --- */
        footer { 
            margin-top: 50px; 
            padding-top: 30px; 
            border-top: 1px solid #edf2f7; 
        }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .footer-section h3 { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #718096; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .footer-list { list-style: none; padding: 0; margin: 0; }
        .footer-list li { margin-bottom: 12px; font-size: 0.95rem; }
        .footer-list label { font-weight: 600; color: #4a5568; min-width: 110px; display: inline-block; }
        .footer-list a { color: #3182ce; text-decoration: none; }
        .author-name { font-size: 1.1rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; display: block; }

        @media (max-width: 600px) { .footer-grid { grid-template-columns: 1fr; gap: 30px; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Bitcoin Price History</h2>

    <section class="table-section">
        <table id="btc-table" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Close Price (USD)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <section class="d3-chart-section">
        <h3 class="chart-section-header">BTC Price - D3.js</h3>
        <div id="d3-chart-container"></div>
    </section>

    <section class="apex-chart-section">
        <h3 class="chart-section-header">BTC Price - ApexCharts</h3>
        <div id="apex-chart-container"></div>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="footer-section">
                <h3><i class="fa-solid fa-link"></i> Project Links</h3>
                <ul class="footer-list">
                    <li><label>Website:</label> <a href="https://phuchduong.github.io/algorithmic-codex/btc_dt/" target="_blank">BTC Price History</a></li>
                    <li><label>Repo Readme:</label> <a href="https://phuchduong.github.io/algorithmic-codex/" target="_blank">Algorithmic Codex</a></li>
                    <li><label>Source Code:</label> <a href="https://github.com/phuchduong/algorithmic-codex" target="_blank">github.com/phuchduong</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3><i class="fa-solid fa-user"></i> Author</h3>
                <span class="author-name">Phuc Duong</span>
                <ul class="footer-list">
                    <li><label><i class="fa-brands fa-github"></i> GitHub:</label> <a href="https://github.com/phuchduong" target="_blank">@phuchduong</a></li>
                    <li><label><i class="fa-brands fa-linkedin"></i> LinkedIn:</label> <a href="https://www.linkedin.com/in/phuchduong/" target="_blank">in/phuchduong</a></li>
                </ul>
            </div>
        </div>
    </footer>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<script>
    /**
     * SHARED DATA UTILITIES
     */
    async function load_data(url) {
        return await d3.csv(url);
    }

    function parse_data(data) {
        const parseTime = d3.timeParse("%Y-%m-%d");
        return data.map(d => ({
            ...d,
            dateObj: parseTime(d.Date.split(' ')[0]),
            closeVal: +d.Close,
            formattedDate: d.Date.split(' ')[0]
        }));
    }

    /**
     * MODULE: DATATABLES
     */
    function InitDataTable(data) {
        try {
            const tableEl = document.getElementById('btc-table');
            if (!tableEl) return;

            $(tableEl).DataTable({
                data: data,
                columns: [
                    { data: "formattedDate" },
                    { 
                        data: "closeVal", 
                        render: $.fn.dataTable.render.number(',', '.', 2, '$')
                    }
                ],
                order: [[0, 'desc']],
                pageLength: 10
            });
        } catch (err) { console.error("DataTable Error:", err); }
    }

    /**
     * MODULE: D3 CHART
     */
    function InitD3Chart(data) {
        try {
            const container = document.getElementById('d3-chart-container');
            if (!container) return;

            const margin = {top: 20, right: 30, bottom: 40, left: 60};
            const width = container.offsetWidth - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            const svg = d3.select("#d3-chart-container")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleTime()
                .domain(d3.extent(data, d => d.dateObj))
                .range([0, width]);

            const y = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.closeVal)])
                .range([height, 0]);

            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).ticks(6))
                .attr("class", "axis-label");

            svg.append("g")
                .call(d3.axisLeft(y).tickFormat(d => "$" + d3.format(",.0f")(d)))
                .attr("class", "axis-label");

            const line = d3.line()
                .x(d => x(d.dateObj))
                .y(d => y(d.closeVal));

            svg.append("path")
                .datum(data.sort((a, b) => a.dateObj - b.dateObj))
                .attr("class", "line")
                .attr("d", line);
        } catch (err) { console.error("D3 Error:", err); }
    }

    /**
     * MODULE: APEX CHARTS
     */
    function InitApexChart(data) {
        try {
            const container = document.getElementById('apex-chart-container');
            if (!container) return;

            const seriesData = data.map(d => [d.dateObj.getTime(), d.closeVal]).sort((a, b) => a[0] - b[0]);

            const options = {
                series: [{ name: 'BTC Price', data: seriesData }],
                chart: { type: 'area', height: 350, zoom: { enabled: true } },
                dataLabels: { enabled: false },
                stroke: { curve: 'smooth', width: 2 },
                xaxis: { type: 'datetime', labels: { style: { colors: '#718096' } } },
                yaxis: {
                    labels: {
                        formatter: (val) => "$" + val.toLocaleString(),
                        style: { colors: '#718096' }
                    }
                },
                colors: ['#3182ce'],
                fill: {
                    type: 'gradient',
                    gradient: { opacityFrom: 0.4, opacityTo: 0.1 }
                }
            };

            new ApexCharts(container, options).render();
        } catch (err) { console.error("Apex Error:", err); }
    }

    /**
     * EXECUTION
     */
    (async () => {
        try {
            const raw = await load_data("btc_full_history_to_today.csv");
            const data = parse_data(raw);

            InitDataTable(data);
            InitD3Chart(data);
            InitApexChart(data);
        } catch (err) {
            console.error("Main Execution Failed:", err);
        }
    })();
</script>

</body>
</html>
