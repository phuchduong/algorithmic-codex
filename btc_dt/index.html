<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Price History</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f4f7f9; color: #2d3436; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 25px; font-weight: 700; color: #1e272e; }

        /* Modernized Footer Styling */
        footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #edf2f7;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .footer-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #718096;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer-section h3 i { color: #4a5568; }
        .footer-list { list-style: none; padding: 0; margin: 0; }
        .footer-list li { margin-bottom: 12px; font-size: 0.95rem; }
        .footer-list label { font-weight: 600; color: #4a5568; min-width: 110px; display: inline-block; }
        .footer-list a { 
            color: #3182ce; 
            text-decoration: none; 
            transition: color 0.2s ease;
        }
        .footer-list a:hover { color: #2c5282; text-decoration: underline; }
        .author-name { font-size: 1.1rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; display: block; }

        @media (max-width: 600px) {
            .footer-grid { grid-template-columns: 1fr; gap: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bitcoin Price History</h2>
    <table id="btc-table" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Date</th>
                <th>Close Price (USD)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <footer>
        <div class="footer-grid">
            <div class="footer-section">
                <h3><i class="fa-solid fa-link"></i> Project Links</h3>
                <ul class="footer-list">
                    <li>
                        <label>Reference:</label>
                        <a href="https://phuchduong.github.io/algorithmic-codex/btc_dt/" target="_blank">algorithmic-codex/btc_dt</a>
                    </li>
                    <li>
                        <label>Source Code:</label>
                        <a href="https://github.com/phuchduong/algorithmic-codex" target="_blank">github.com/phuchduong</a>
                    </li>
                </ul>
            </div>

            <div class="footer-section">
                <h3><i class="fa-solid fa-user"></i> Author</h3>
                <span class="author-name">Phuc Duong</span>
                <ul class="footer-list">
                    <li>
                        <label><i class="fa-brands fa-github"></i> GitHub:</label>
                        <a href="https://github.com/phuchduong" target="_blank">@phuchduong</a>
                    </li>
                    <li>
                        <label><i class="fa-brands fa-linkedin"></i> LinkedIn:</label>
                        <a href="https://www.linkedin.com/in/phuchduong/" target="_blank">in/phuchduong</a>
                    </li>
                </ul>
            </div>
        </div>
    </footer>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
    async function loadData() {
        try {
            const data = await d3.csv("btc_full_history_to_today.csv");

            $('#btc-table').DataTable({
                data: data,
                columns: [
                    { 
                        data: "Date",
                        render: function(data) { return data.split(' ')[0]; }
                    },
                    { 
                        data: "Close",
                        render: function(data) {
                            let val = parseFloat(data);
                            return '$' + val.toLocaleString(undefined, {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            });
                        }
                    }
                ],
                order: [[0, 'desc']],
                pageLength: 10,
                lengthMenu: [10, 20, 50, 100],
                responsive: true
            });
        } catch (error) {
            console.error("Error loading CSV:", error);
        }
    }
    loadData();
</script>

</body>
</html>
